<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="cardd shadow p-4">
            <h1 class="mb-4">
                Editar Tarea
            </h1>
            <form method="POST">
                {% csrf_token %}

                <input
                    type="text"
                    name="title"
                    class="form-control mb-3"
                    value="{{ task.title }}"
                >

                <button type="submit" class="bbtn btn-success">
                    Guardar Cambios
                </button>

                <a 
                    href="{% url 'task_list' %}"
                    class="btn btn-secondary"
                >
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</body>
</html>
